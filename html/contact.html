<body style="
      background-image: url('../assets/cubes_volume_black_133676_3840x2160.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      height: 100vh;
      width: 100vw;
      background-attachment: fixed; 
    ">
    <nav class="navbar navbar-dark navbar-expand-lg bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <h4 class="om">&lt; Om /&gt;</h4>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" aria-current="page" href="../index.html">Home</a>
                    <a class="nav-link" href="techstack.html">Tools And Skills</a>
                    <a class="nav-link" href="projects.html">Projects</a>
                    <a class="nav-link active" href="contact.html">Contact me</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="row mt-3 container-fluid">

        <div class="container text-light col-lg-6 col-md-12 col-sm-12">
            <div class="headerSizes">Get in touch with me at</div>
            <ul class="no-bullets">
                <li class="margins">
                    <a href="https://github.com/Om-Alve" class="home__social-icon nav-link contactText"><i
                            class='bx bxl-github'></i>
                        Github
                    </a>
                </li>
                <li class="margins">
                    <a href="https://www.linkedin.com/in/om-alve-1b8645252/"
                        class="home__social-icon nav-link contactText"><i class='bx bxl-linkedin'></i>
                        LinkedIn
                    </a>
                </li>
                <li class="margins">
                    <a href="https://twitter.com/alve_om" class="home__social-icon nav-link contactText"><i
                            class='bx bxl-twitter'></i>
                        Twitter
                    </a>
                </li>
            </ul>
        </div>
        <div class="container ms-auto text-light col-lg-6 col-md-12 col-sm-12">
            <div class="headerSizes">Say Hi.</div>
            <form name="form" onsubmit="validate();">
                <!-- Name input -->
                <div class="form-outline mb-4">
                    <label class="form-label" for="name">Name</label>
                    <input type="text" name="name" id="name" class="form-control" autocomplete="off" autofocus>
                </div>

                <!-- Email input -->
                <div class="form-outline mb-4">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" name="email" id="email" class="form-control" autocomplete="off">
                </div>

                <!-- Message input -->
                <div class="form-outline mb-4">
                    <label class="form-label" for="Message">Message</label>
                    <textarea class="form-control" id="Message" name="Message" rows="4" autocomplete="off"></textarea>
                </div>
                <!-- Submit button -->
                <button type="submit" class="btn btn-outline-success" id="btnShow"><b style="color:white">Send
                        &#8594;</b></button>
            </form>
        </div>
    </div>
</body>
